<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORE NGUYENLONGIOS | Config & Proxy VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-wrapper">
    <div class="app-container">
        <!-- HEADER CAO CẤP -->
        <div class="header-premium">
            <div class="brand-area">
                <div class="store-icon"><i class="fas fa-crown"></i></div>
                <div class="store-title">
                    <h1>STORE NGUYENLONGIOS</h1>
                    <p>CONFIG • PROXY • SCRIPT • MMO</p>
                </div>
            </div>
            <div class="menu-trigger" id="menuTrigger">
                <i class="fas fa-sliders-h"></i>
                <span class="menu-dot"></span>
            </div>
            <div class="dropdown-glass" id="dropdownGlass">
                <button id="navAccountInfo"><i class="fas fa-user-astronaut"></i> Thông tin tài khoản</button>
                <button id="navTopUp"><i class="fas fa-coins"></i> Nạp tiền (ATM/CARD)</button>
                <button id="navDepositHistory"><i class="fas fa-history"></i> Lịch sử nạp</button>
                <button id="navPurchaseHistory"><i class="fas fa-shopping-bag"></i> Lịch sử mua</button>
                <button id="navLogout"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
                <button id="navAdminPanel"><i class="fas fa-shield-alt"></i> Quản trị viên</button>
            </div>
        </div>

        <!-- AUTH VIEW (Đăng nhập/Đăng ký) -->
        <div id="authScreen" class="auth-screen">
            <div class="auth-header">
                <i class="fas fa-gamepad"></i>
                <h2 id="authTitle">ĐĂNG NHẬP</h2>
            </div>
            <div class="auth-form">
                <div class="input-icon-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="authUsername" placeholder="Tên đăng nhập">
                </div>
                <div class="input-icon-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="authPassword" placeholder="Mật khẩu">
                </div>
                <div id="forgotPasswordHint" class="forgot-hint">Quên mật khẩu?</div>
                <div class="captcha-row">
                    <input type="checkbox" id="captchaCheck"> 
                    <label for="captchaCheck">Tôi không phải là người máy</label>
                    <i class="fas fa-robot captcha-icon"></i>
                </div>
                <button id="authSubmitBtn" class="btn-main">ĐĂNG NHẬP</button>
                <div class="auth-switch">
                    <span id="switchAuthLabel">Bạn không có tài khoản?</span>
                    <span id="toggleAuthModeBtn" class="switch-link">Đăng ký</span>
                </div>
            </div>
        </div>

        <!-- MAIN APP (Sau khi đăng nhập) -->
        <div id="mainAppScreen" style="display: none;">
            <!-- Thông báo số dư nổi bật -->
            <div class="balance-card" id="balanceCard">
                <i class="fas fa-wallet"></i>
                <span>Số dư: </span><strong id="userBalanceDisplay">0đ</strong>
            </div>

            <!-- SẢN PHẨM -->
            <div class="section-label">
                <i class="fas fa-gem"></i> GÓI CẤU HÌNH VIP
                <i class="fas fa-headset" style="margin-left: auto;"></i>
            </div>
            <div id="productsGrid" class="products-grid"></div>

            <!-- SẢN PHẨM ĐÃ MUA -->
            <div class="section-label">
                <i class="fas fa-folder-open"></i> KHO FILE ĐÃ MUA
            </div>
            <div id="purchasedArea" class="purchased-area">Chưa có sản phẩm nào</div>

            <!-- ADMIN PANEL (ẩn) -->
            <div id="adminPanelSection" class="admin-panel-glass" style="display: none;">
                <div class="admin-title"><i class="fas fa-dragon"></i> BẢNG ĐIỀU KHIỂN</div>
                <input type="text" id="adminProdName" placeholder="Tên sản phẩm">
                <textarea id="adminProdDesc" rows="2" placeholder="Mô tả chi tiết..."></textarea>
                <input type="number" id="adminProdPrice" placeholder="Giá (VNĐ)">
                <textarea id="adminProdFiles" rows="2" placeholder="Link file (mỗi dòng 1 link)"></textarea>
                <button id="adminAddProductBtn" class="admin-btn">➕ THÊM SẢN PHẨM</button>
                <hr>
                <input type="text" id="adminTargetUser" placeholder="Tên user cần cộng tiền">
                <input type="number" id="adminMoneyAmount" placeholder="Số tiền">
                <button id="adminAddMoneyBtn" class="admin-btn">💰 CỘNG TIỀN USER</button>
                <button id="adminSelfAddMoneyBtn" class="admin-btn">✨ +100K CHO ADMIN</button>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer-info">
            <i class="fab fa-zalo"></i> ZALO: 0933653553 (Nguyen Long) &nbsp;|&nbsp;
            <i class="fab fa-tiktok"></i> TIKTOK: NguyenLong X Aura
        </div>
    </div>
</div>
<div id="globalToast" class="global-toast"></div>

<script src="data.js"></script>
<script src="admin.js"></script>
<script src="script.js"></script>
</body>
</html>
