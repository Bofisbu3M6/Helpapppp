<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORE NGUYENLONGIOS | Config & Proxy VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #05070f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container chính */
        .app {
            max-width: 450px;
            width: 100%;
            margin: 20px auto;
            background: #0e1020;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(255, 200, 100, 0.2), 0 20px 40px rgba(0,0,0,0.5);
        }

        /* ===== HEADER ===== */
        .header {
            background: #0a0c18;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ffd96620;
        }
        .logo h1 {
            font-size: 18px;
            font-weight: 700;
            color: #FFD966;
            letter-spacing: -0.3px;
        }
        .logo p {
            font-size: 9px;
            color: #6c7aa0;
            margin-top: 2px;
        }
        .menu-btn {
            background: #161c30;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: #FFD966;
            border: 1px solid #ffd96630;
            transition: 0.2s;
        }
        .dropdown {
            position: absolute;
            top: 70px;
            right: 20px;
            background: #12172e;
            border-radius: 16px;
            width: 230px;
            z-index: 200;
            display: none;
            flex-direction: column;
            border: 1px solid #ffd96640;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .dropdown.show {
            display: flex;
        }
        .dropdown button {
            background: transparent;
            border: none;
            padding: 14px 18px;
            text-align: left;
            color: #eef2ff;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #212842;
        }
        .dropdown button:last-child {
            border-bottom: none;
        }
        .dropdown button i {
            width: 22px;
            color: #FFD966;
        }
        .dropdown button:hover {
            background: #1f2746;
        }

        /* ===== FORM ĐĂNG NHẬP / ĐĂNG KÝ (CHUẨN NHƯ ẢNH) ===== */
        .auth-container {
            padding: 30px 24px 40px;
        }
        .auth-title {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 28px;
            color: #ffffff;
        }
        .input-field {
            margin-bottom: 18px;
        }
        .input-field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #b8c3e6;
        }
        .input-field input {
            width: 100%;
            background: #12172e;
            border: 1px solid #2a3357;
            padding: 14px 18px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .input-field input::placeholder {
            color: #5f6b92;
        }
        .forgot-link {
            text-align: right;
            font-size: 12px;
            color: #8f9bb3;
            margin: -10px 0 20px;
        }
        .captcha-box {
            background: #12172e;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            border: 1px solid #2a3357;
        }
        .captcha-box input {
            width: 18px;
            height: 18px;
        }
        .captcha-box span {
            font-size: 13px;
            color: #b8c3e6;
        }
        .captcha-box i {
            margin-left: auto;
            color: #FFB347;
            font-size: 20px;
        }
        .btn-submit {
            background: #2a3670;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            color: white;
            cursor: pointer;
            margin-top: 8px;
        }
        .switch-area {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #9aa5c5;
        }
        .switch-area .switch-link {
            color: #FFD966;
            font-weight: bold;
            cursor: pointer;
            margin-left: 6px;
        }

        /* ===== CARD SẢN PHẨM (GIỐNG ẢNH) ===== */
        .products-area {
            padding: 20px 18px;
        }
        .product-card {
            background: #0f1324;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid #262e50;
        }
        .product-title {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
        }
        .product-price {
            font-size: 26px;
            font-weight: 800;
            color: #FFD966;
            margin: 6px 0;
        }
        .product-description {
            font-size: 12px;
            color: #b0bbdf;
            line-height: 1.5;
            margin: 10px 0;
            white-space: pre-line;
        }
        .buy-button {
            background: #2a3670;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            color: white;
            margin-top: 12px;
            cursor: pointer;
        }
        .balance-info {
            background: #0a0e1c;
            margin: 16px 18px;
            padding: 12px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #ffd96630;
        }
        .purchased-section {
            background: #0a0e1c;
            margin: 20px 18px;
            border-radius: 20px;
            padding: 16px;
        }
        .purchased-item {
            background: #12172e;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .file-list {
            background: #00000040;
            padding: 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-top: 8px;
            word-break: break-all;
        }
        .admin-panel {
            background: #0c1022;
            margin: 16px 18px;
            padding: 18px;
            border-radius: 20px;
            border: 1px solid #ffd96630;
        }
        .admin-panel input, .admin-panel textarea {
            background: #161e38;
            border: 1px solid #2e3a66;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 12px;
            color: white;
        }
        .admin-btn {
            background: #2a3670;
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 8px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 16px;
            font-size: 10px;
            border-top: 1px solid #1a1f38;
            color: #6c7aa0;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a243f;
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 999;
            display: none;
            font-size: 12px;
            border: 1px solid #FFD966;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <h1>STORE NGUYENLONGIOS</h1>
            <p>CONFIG • PROXY • SCRIPT</p>
        </div>
        <div class="menu-btn" id="menuBtn">
            <i class="fas fa-bars"></i>
        </div>
        <div class="dropdown" id="dropdown">
            <button id="accInfo"><i class="fas fa-user"></i> Thông tin tài khoản</button>
            <button id="topupNav"><i class="fas fa-credit-card"></i> Nạp tiền (ATM/CARD)</button>
            <button id="depositNav"><i class="fas fa-history"></i> Lịch sử nạp</button>
            <button id="purchaseNav"><i class="fas fa-shopping-bag"></i> Lịch sử mua</button>
            <button id="logoutNav"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            <button id="adminNav"><i class="fas fa-crown"></i> Quản trị viên</button>
        </div>
    </div>

    <!-- FORM ĐĂNG NHẬP / ĐĂNG KÝ -->
    <div id="authScreen">
        <div class="auth-container">
            <div class="auth-title" id="authTitle">Đăng Nhập</div>
            <div class="input-field">
                <label>Tên đăng nhập</label>
                <input type="text" id="loginUser" placeholder="Enter Username">
            </div>
            <div class="input-field">
                <label>Mật khẩu</label>
                <input type="password" id="loginPass" placeholder="Vui lòng nhập mật khẩu">
            </div>
            <div class="forgot-link" id="forgotLink">Quên mật khẩu</div>
            <div class="captcha-box">
                <input type="checkbox" id="captchaCheck">
                <span>Tôi không phải là người máy</span>
                <i class="fas fa-robot"></i>
            </div>
            <button class="btn-submit" id="submitAuth">Đăng Nhập</button>
            <div class="switch-area">
                <span id="switchMsg">Bạn không có tài khoản?</span>
                <span class="switch-link" id="toggleMode">Đăng ký</span>
            </div>
        </div>
    </div>

    <!-- MAIN APP SAU LOGIN -->
    <div id="mainScreen" style="display: none;">
        <div class="balance-info">
            <i class="fas fa-wallet" style="color:#FFD966"></i>
            <span>Số dư: </span><strong id="balanceValue">0đ</strong>
        </div>
        <div class="products-area" id="productsContainer"></div>
        <div class="purchased-section">
            <div style="margin-bottom: 10px;"><i class="fas fa-download"></i> Sản phẩm đã mua</div>
            <div id="purchasedContainer">Chưa có sản phẩm nào</div>
        </div>
        <div id="adminPanel" class="admin-panel" style="display: none;">
            <div style="font-weight:bold;margin-bottom:12px">👑 ADMIN</div>
            <input type="text" id="prodName" placeholder="Tên sản phẩm">
            <textarea id="prodDesc" rows="2" placeholder="Mô tả..."></textarea>
            <input type="number" id="prodPrice" placeholder="Giá VNĐ">
            <textarea id="prodFilesList" rows="2" placeholder="Link file (mỗi dòng 1 link)"></textarea>
            <button id="addProdBtn" class="admin-btn">➕ Thêm sản phẩm</button>
            <hr style="margin:12px 0;border-color:#2a3357">
            <input type="text" id="targetUserName" placeholder="Tên user cần cộng tiền">
            <input type="number" id="moneyAmount" placeholder="Số tiền">
            <button id="addMoneyUserBtn" class="admin-btn">💰 Cộng tiền user</button>
            <button id="selfAddMoneyBtn" class="admin-btn">✨ +100K cho Admin</button>
        </div>
    </div>

    <footer>
        <i class="fab fa-zalo"></i> ZALO: 0933653553 (Nguyen Long) &nbsp;|&nbsp;
        <i class="fab fa-tiktok"></i> TIKTOK: NguyenLong X Aura
    </footer>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    // ==================== DATA ====================
    const ADMIN_USER = "Storenguyenlongvipios2026";
    const ADMIN_PASS = "Nguyenlongdeveloper2026";

    let users = JSON.parse(localStorage.getItem("nl_users_db")) || {};
    let products = JSON.parse(localStorage.getItem("nl_products_db")) || [];
    let purchases = JSON.parse(localStorage.getItem("nl_purchases_db")) || [];
    let deposits = JSON.parse(localStorage.getItem("nl_deposits_db")) || [];
    let currentUser = null;

    function randomCode() {
        return "NL" + Math.random().toString(36).substring(2, 10).toUpperCase();
    }

    // Khởi tạo dữ liệu mặc định
    if (Object.keys(users).length === 0) {
        users[ADMIN_USER] = {
            username: ADMIN_USER,
            password: ADMIN_PASS,
            isAdmin: true,
            balance: 999000,
            customerCode: randomCode(),
            createdAt: new Date().toISOString()
        };
        users["demoUser"] = {
            username: "demoUser",
            password: "demo123",
            isAdmin: false,
            balance: 250000,
            customerCode: randomCode(),
            createdAt: new Date().toISOString()
        };
    }

    if (products.length === 0) {
        products = [
            { id: "p1", name: "MUA GÓI TIÊU CHUẨN", price: 150000, desc: "Config / Trải Nghiệm\n- Fix rung tâm cơ bản (50-60%)\n- Chạy tốt trên iOS & Android\n- Cài đặt nhanh gọn", files: ["https://file.demo/config-std.zip"] },
            { id: "p2", name: "Config Tiêu Chuẩn", price: 350000, desc: "Dành cho leo Rank tâm trung & giải trí.\n- Fix rung tâm tốt (60%)\n- Độ nhạy ổn định, dễ kéo hơn 50%\n- Giảm giật lag nhẹ", files: ["https://file.demo/config-pro.zip"] },
            { id: "p3", name: "Pro Script Vĩnh Viễn 🎉", price: 500000, desc: "✅ Mở khoá toàn bộ tính năng VIP\n✅ Tối ưu đường truyền, giảm giật lag\n✅ Cập nhật Script miễn phí trọn đời", files: ["https://file.demo/script-pro.zip"] },
            { id: "p4", name: "CONFIG VIP - LIMITED 🚀", price: 500000, desc: "DÀNH CHO DÂN CHUYÊN / ĐI KÈO TIỀN\n- Bám đầu 99%, nhẹ tâm tuyệt đối\n- Ổn định 100%, No Delay\n- Hỗ trợ update trọn đời", files: ["https://file.demo/vip-limited.zip"] }
        ];
    }

    function saveAll() {
        localStorage.setItem("nl_users_db", JSON.stringify(users));
        localStorage.setItem("nl_products_db", JSON.stringify(products));
        localStorage.setItem("nl_purchases_db", JSON.stringify(purchases));
        localStorage.setItem("nl_deposits_db", JSON.stringify(deposits));
    }
    saveAll();

    function toast(msg, isErr = false) {
        const t = document.getElementById("toastMsg");
        t.textContent = msg;
        t.style.display = "block";
        t.style.background = isErr ? "#992222" : "#1f4f2b";
        setTimeout(() => t.style.display = "none", 2500);
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Render sản phẩm
    function renderProducts() {
        const container = document.getElementById("productsContainer");
        if (!container || !currentUser) return;
        if (products.length === 0) {
            container.innerHTML = "<div style='text-align:center;padding:20px'>Chưa có sản phẩm</div>";
            return;
        }
        container.innerHTML = products.map(p => `
            <div class="product-card">
                <div class="product-title">${escapeHtml(p.name)}</div>
                <div class="product-price">${p.price.toLocaleString()}đ</div>
                <div class="product-description">${escapeHtml(p.desc).replace(/\n/g, '<br>')}</div>
                <button class="buy-button" data-id="${p.id}" data-price="${p.price}" data-name="${escapeHtml(p.name)}" data-files='${JSON.stringify(p.files)}'>MUA NGAY</button>
            </div>
        `).join('');

        document.querySelectorAll('.buy-button').forEach(btn => {
            btn.addEventListener('click', () => {
                const price = parseInt(btn.dataset.price);
                if (currentUser.balance < price) {
                    toast(`Số dư không đủ! Cần ${price.toLocaleString()}đ`, true);
                    return;
                }
                currentUser.balance -= price;
                users[currentUser.username].balance = currentUser.balance;
                purchases.push({
                    username: currentUser.username,
                    productName: btn.dataset.name,
                    files: JSON.parse(btn.dataset.files),
                    boughtAt: new Date().toISOString()
                });
                saveAll();
                renderPurchased();
                renderProducts();
                updateBalance();
                toast(`✅ Mua thành công ${btn.dataset.name}!`);
            });
        });
    }

    function renderPurchased() {
        const container = document.getElementById("purchasedContainer");
        if (!container || !currentUser) return;
        const my = purchases.filter(p => p.username === currentUser.username);
        if (my.length === 0) {
            container.innerHTML = "Chưa có sản phẩm nào.";
            return;
        }
        container.innerHTML = my.map(item => `
            <div class="purchased-item">
                <strong>${escapeHtml(item.productName)}</strong> - ${new Date(item.boughtAt).toLocaleString()}
                <div class="file-list">
                    <i class="fas fa-paperclip"></i> Link tải:<br>
                    ${item.files.map(f => `<a href="${f}" target="_blank" style="color:#FFD966;">${escapeHtml(f)}</a>`).join('<br>')}
                </div>
            </div>
        `).join('');
    }

    function updateBalance() {
        const bal = document.getElementById("balanceValue");
        if (bal && currentUser) bal.innerText = currentUser.balance.toLocaleString() + "đ";
    }

    // Nạp tiền
    function handleTopUp() {
        if (!currentUser) { toast("Đăng nhập trước", true); return; }
        const method = confirm("◉ OK = ATM (Admin xử lý thủ công)\n◉ Cancel = Thẻ cào (AutoCard1s)");
        if (method) {
            let amount = prompt("Số tiền nạp ATM:", "100000");
            if (amount && !isNaN(parseInt(amount))) {
                deposits.push({ username: currentUser.username, amount: parseInt(amount), method: "ATM", status: "Chờ duyệt", timestamp: new Date().toISOString() });
                saveAll();
                toast("Yêu cầu nạp ATM đã ghi nhận, admin xử lý.");
            }
        } else {
            let code = prompt("Mã thẻ (Code):");
            let serial = prompt("Serial thẻ:");
            let money = prompt("Mệnh giá:");
            if (code && serial && money && !isNaN(parseInt(money))) {
                if (code.toLowerCase().includes("error") || serial.toLowerCase().includes("error")) {
                    deposits.push({ username: currentUser.username, amount: parseInt(money), method: "Thẻ cào", status: "Thất bại", timestamp: new Date().toISOString() });
                    saveAll();
                    toast("Thẻ lỗi! Sai mã/serial.", true);
                } else {
                    currentUser.balance += parseInt(money);
                    users[currentUser.username].balance = currentUser.balance;
                    deposits.push({ username: currentUser.username, amount: parseInt(money), method: "Thẻ cào Auto", status: "Thành công", timestamp: new Date().toISOString() });
                    saveAll();
                    toast(`Nạp thẻ thành công! +${parseInt(money).toLocaleString()}đ`);
                    renderProducts();
                    updateBalance();
                }
            } else toast("Thông tin không hợp lệ", true);
        }
    }

    // ===== AUTH =====
    let isLogin = true;
    function toggleMode() {
        isLogin = !isLogin;
        const title = document.getElementById("authTitle");
        const btn = document.getElementById("submitAuth");
        const switchMsg = document.getElementById("switchMsg");
        const toggleLink = document.getElementById("toggleMode");
        const forgot = document.getElementById("forgotLink");
        if (isLogin) {
            title.innerText = "Đăng Nhập";
            btn.innerText = "Đăng Nhập";
            switchMsg.innerText = "Bạn không có tài khoản?";
            toggleLink.innerText = "Đăng ký";
            forgot.style.display = "block";
        } else {
            title.innerText = "Đăng Ký";
            btn.innerText = "Đăng Ký";
            switchMsg.innerText = "Đã có tài khoản?";
            toggleLink.innerText = "Đăng nhập";
            forgot.style.display = "none";
        }
    }

    function handleAuth() {
        const username = document.getElementById("loginUser").value.trim();
        const password = document.getElementById("loginPass").value.trim();
        const captcha = document.getElementById("captchaCheck").checked;
        if (!username || !password) { toast("Vui lòng nhập đầy đủ", true); return; }
        if (!captcha) { toast("Xác nhận bạn không phải người máy", true); return; }

        if (isLogin) {
            if (users[username] && users[username].password === password) {
                currentUser = users[username];
                localStorage.setItem("nl_session", username);
                toast(`Chào mừng ${username}`);
                switchToMain();
            } else {
                toast("Sai tên đăng nhập hoặc mật khẩu", true);
            }
        } else {
            if (users[username]) { toast("Tên đã tồn tại", true); return; }
            const newUser = {
                username, password, isAdmin: false, balance: 50000,
                customerCode: randomCode(), createdAt: new Date().toISOString()
            };
            users[username] = newUser;
            saveAll();
            currentUser = newUser;
            localStorage.setItem("nl_session", username);
            toast("Đăng ký thành công! +50,000đ");
            switchToMain();
        }
    }

    function switchToMain() {
        document.getElementById("authScreen").style.display = "none";
        document.getElementById("mainScreen").style.display = "block";
        renderProducts();
        renderPurchased();
        updateBalance();
        if (currentUser && currentUser.isAdmin) {
            document.getElementById("adminPanel").style.display = "block";
        } else {
            document.getElementById("adminPanel").style.display = "none";
        }
    }

    function logout() {
        localStorage.removeItem("nl_session");
        location.reload();
    }

    // Admin
    function addProduct() {
        const name = document.getElementById("prodName").value.trim();
        const desc = document.getElementById("prodDesc").value.trim();
        const price = parseInt(document.getElementById("prodPrice").value);
        const filesRaw = document.getElementById("prodFilesList").value;
        if (!name || isNaN(price) || price <= 0) { toast("Tên và giá hợp lệ", true); return; }
        const fileArr = filesRaw.split("\n").filter(f => f.trim() !== "");
        products.push({
            id: "p" + Date.now(),
            name, price, desc: desc || "Gói cấu hình cao cấp",
            files: fileArr.length ? fileArr : ["https://default.link"]
        });
        saveAll();
        renderProducts();
        toast("Thêm sản phẩm thành công!");
        document.getElementById("prodName").value = "";
        document.getElementById("prodDesc").value = "";
        document.getElementById("prodPrice").value = "";
        document.getElementById("prodFilesList").value = "";
    }

    function addMoneyToUser() {
        const target = document.getElementById("targetUserName").value.trim();
        const amount = parseInt(document.getElementById("moneyAmount").value);
        if (!users[target] || isNaN(amount) || amount <= 0) { toast("User không tồn tại", true); return; }
        users[target].balance += amount;
        if (currentUser && currentUser.username === target) {
            currentUser.balance = users[target].balance;
            updateBalance();
            renderProducts();
        }
        saveAll();
        toast(`Đã cộng ${amount.toLocaleString()}đ cho ${target}`);
    }

    function selfAddMoney() {
        if (currentUser && currentUser.isAdmin) {
            currentUser.balance += 100000;
            users[currentUser.username].balance = currentUser.balance;
            saveAll();
            updateBalance();
            renderProducts();
            toast("Admin +100,000đ");
        } else toast("Không có quyền", true);
    }

    // ===== GÁN SỰ KIỆN =====
    document.getElementById("toggleMode")?.addEventListener("click", toggleMode);
    document.getElementById("submitAuth")?.addEventListener("click", handleAuth);
    document.getElementById("logoutNav")?.addEventListener("click", logout);
    document.getElementById("topupNav")?.addEventListener("click", handleTopUp);
    document.getElementById("addProdBtn")?.addEventListener("click", addProduct);
    document.getElementById("addMoneyUserBtn")?.addEventListener("click", addMoneyToUser);
    document.getElementById("selfAddMoneyBtn")?.addEventListener("click", selfAddMoney);

    document.getElementById("accInfo")?.addEventListener("click", () => {
        if (currentUser) alert(`👤 TK: ${currentUser.username}\n🎫 Mã: ${currentUser.customerCode}\n📅 Tạo: ${new Date(currentUser.createdAt).toLocaleString()}\n💰 Dư: ${currentUser.balance.toLocaleString()}đ`);
        else toast("Chưa đăng nhập", true);
    });
    document.getElementById("depositNav")?.addEventListener("click", () => {
        if (!currentUser) return;
        const his = deposits.filter(d => d.username === currentUser.username);
        if (his.length === 0) alert("Chưa có lịch sử nạp");
        else alert(his.map(h => `${h.method} - ${h.amount.toLocaleString()}đ - ${h.status} - ${new Date(h.timestamp).toLocaleString()}`).join("\n"));
    });
    document.getElementById("purchaseNav")?.addEventListener("click", () => {
        if (!currentUser) return;
        const his = purchases.filter(p => p.username === currentUser.username);
        if (his.length === 0) alert("Chưa mua sản phẩm");
        else alert(his.map(p => `${p.productName} - ${new Date(p.boughtAt).toLocaleString()}`).join("\n"));
    });
    document.getElementById("adminNav")?.addEventListener("click", () => {
        if (currentUser && currentUser.isAdmin) document.getElementById("adminPanel").style.display = "block";
        else toast("Không có quyền admin", true);
    });

    // Menu dropdown
    const menu = document.getElementById("menuBtn");
    const drop = document.getElementById("dropdown");
    menu?.addEventListener("click", (e) => { e.stopPropagation(); drop.classList.toggle("show"); });
    document.addEventListener("click", (e) => { if (!drop.contains(e.target) && e.target !== menu) drop.classList.remove("show"); });

    // Session
    const session = localStorage.getItem("nl_session");
    if (session && users[session]) {
        currentUser = users[session];
        switchToMain();
    }
</script>
</body>
</html>
